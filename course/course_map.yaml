# course_map.yaml — NLP Professional Development Course
# VMQ 425-son, 64-son loyiha | KALENDAR ISH REJASI
# 15-iyun – 10-iyul 2026 | 16 ta dars kuni + 4 ta chorshanba milestone
#
# SINGLE SOURCE OF TRUTH. No artifact may be produced for a day whose row
# is not approved. All lecture_topic and practice_topic values are verbatim
# from the official "KALENDAR ISH REJASI" annex tables.
#
# Scheduling rule (approved):
#   Day 1 morning = Orientation (absorbs P1 item 1 — environment setup)
#   Day 1 lecture  = L1
#   Day N morning  = P(N-1)   for N = 2..16
#   Day N lecture  = L(N)     for N = 2..16
#   P16 (FastAPI/Docker) = M4 milestone (8-iyul) — fully worked PRIMM, no core scaffold
#
# Hour accounting (SETTLED):
#   Lecture hours : L1–L16 on Days 1–16 = 16 × 2h = 32h ✓
#   Practice hours: P1–P15 on Days 2–16 = 15 × 2h = 30h
#                 + P16 on M4           =  1 × 2h =  2h
#                                                   ────
#                                                    32h ✓
#   Orientation (Day 1 morning, 2h): BONUS contact, NOT folded into P1.
#     - Official curriculum total = 32 + 32 = 64h (matches VMQ contract).
#     - Total contact including orientation = 66h.
#     - P1 (Day 2) skips environment setup because orientation absorbed P1 item 1.
#   Total curriculum: 32 + 32 = 64h ✓  |  Total contact: 66h

meta:
  course:   "Tabiiy tilni qayta ishlash (NLP)"
  contract: "VMQ 425-son, 64-son loyiha"
  executor: "Atadjanov Ibragim Ravshonbekovich"
  dates:    "2026-06-15 – 2026-07-10"
  schedule: "Du/Se/Pa/Ju dars kunlari; Chorshanba milestone (async)"
  capstone: "O'zbek-tili hujjat yordamchisi (Uzbek Document Assistant)"
  practice_slot: "09:30–10:50 (I.R. Atadjanov)"
  lecture_slot:  "11:00–12:20 (A.A. Abdulali)"

# Deliverable formats (approved — PPTX not required; beamer→PDF is settled).
# Pull-time license confirmation required before any dataset is committed to a notebook.
artifact_formats:
  lecture:          "LaTeX Beamer → course/lectures/dNN_topic.pdf"
  practice:         "Jupyter Notebook → course/practices/dNN_topic.ipynb"
  milestone_brief:  "Markdown → course/milestones/wN_milestone.md"
  milestone_check:  "Python script → course/milestones/wN_check.py"
  qa_report:        "Markdown → course/qa/dNN_qa.md"
  capstone_spec:    "Markdown → course/capstone/spec.md"
  capstone_rubric:  "DOCX + XLSX → course/capstone/rubric.{docx,xlsx}"
  final_test:       "DOCX + XLSX → course/final_test.{docx,xlsx}  (issued M4, due Day 15)"
  licenses:         "Markdown → LICENSES.md  (repo root; updated each time a corpus is added)"
  day1_orientation: "Markdown checklist + .ipynb env-check → course/day1_orientation/"

# Dataset registry — all corpora used across the course.
# Corpora with UNRESOLVED status must be approved before notebook production.
corpus_registry:
  uz_news_mini:
    desc:    "200 o'zbek yangilik maqolasi (kun.uz, gazeta.uz)"
    size:    "~100 KB text"
    source:  "Kaggle Dataset — attached Day 1"
    status:  APPROVED
  uz_news_full:
    desc:    "5 000 o'zbek yangilik maqolasi"
    size:    "~2 MB text"
    source:  "Kaggle Dataset — same attachment, larger split"
    status:  APPROVED
  cc_uz_100k_kv:
    desc:    "Top-100k Word2Vec vektorlari (Common Crawl Uzbek, truncated .kv)"
    size:    "~240 MB"
    source:  "Kaggle Dataset — attached Day 4"
    status:  APPROVED    # truncated from cc.uz per item 3 in review decisions
  # ── C1 NER RESOLUTION ────────────────────────────────────────────────────
  # HF Hub search (2026-06-13) found two candidates:
  #   (a) risqaliyevds/uzbek_ner — MIT, 10K-100K, but WRONG FORMAT: entity
  #       gazetteer (JSON lists of entity strings), NOT IOB2 labeled sentences.
  #       Cannot be used to train a sequence labeler. May be used as a
  #       supplementary gazetteer in post-processing if desired.
  #   (b) ShakhzoDavronov/ner-prepared-uzbek — 19 609 IOB2 train examples
  #       (created 2025-02-26), newer and larger than WikiANN, but NO LICENSE
  #       declared and NO source attribution in README. License blocker.
  # Verdict: neither candidate qualifies (a=wrong format, b=no license).
  # Fallback per approved resolution: WikiANN-uz, train+dev combined (~200
  # sentences). License basis: data derived from Wikipedia + Wikidata (CC-BY-SA
  # 3.0 upstream); distributed for NLP research. Educational-use basis applies.
  # Notebook explicitly states the data-scarcity limitation.
  uz_ner_wikiann:
    desc:    "WikiANN Uzbek NER — fallback after C1 HF search (unimelb-nlp/wikiann, uz config)"
    url:     "https://huggingface.co/datasets/unimelb-nlp/wikiann"
    size:    "300 rows total: train=100, dev=100, test=100; used as train+dev combined ≈200"
    license: "CC-BY-SA 3.0 (upstream: Wikipedia/Wikidata); educational-use basis documented"
    tags:    "IOB2 — B/I-{PER,LOC,ORG}"
    ner_search_log: "see C1 comment block above"
    status:  RESOLVED    # C1: WikiANN fallback approved. F1 will be low (~40-60%)
                         # — pedagogically honest (demos Uzbek data-scarcity).
                         # Notebook must state this limitation explicitly.
  uz_ner_risqaliyev_ref:
    desc:    "risqaliyevds/uzbek_ner — MIT, entity gazetteer (WRONG FORMAT for seq-label)"
    url:     "https://huggingface.co/datasets/risqaliyevds/uzbek_ner"
    license: "MIT"
    size:    "10K-100K entities (JSON lists by category: LOC, ORG, PERSON, DATE, …)"
    status:  NOT_USED    # Wrong format: entity list, not IOB2 sentences.
                         # Kept as reference; may be used as gazetteer supplement.
  uz_ner_shakhzod_ref:
    desc:    "ShakhzoDavronov/ner-prepared-uzbek — 19 609 IOB2 examples (no license)"
    url:     "https://huggingface.co/datasets/ShakhzoDavronov/ner-prepared-uzbek"
    license: "not declared"
    size:    "19 609 train examples (train split only, no dev/test)"
    status:  NOT_USED    # No license, no source attribution. License blocker.
                         # Revisit if author publishes license.
  # ── C2 RESOLUTION ────────────────────────────────────────────────────────
  uz_en_opus100:
    desc:    "OPUS-100 Uzbek-English parallel corpus (Helsinki-NLP/opus-100, uz-en)"
    url:     "https://huggingface.co/datasets/Helsinki-NLP/opus-100"
    size:    "177 000 training sentence pairs; 20k subsample used in P11"
    license: "unspecified (source corpora: CC/public-domain mix); widely used in NLP research"
    scale:   "P11: max_len=50 tokens, vocab=8000 BPE, 5 epochs on T4 — demo-quality BLEU"
    status:  RESOLVED    # C2 approved: educational/research use; license uncertainty
                         # documented in LICENSES.md and in notebook header comment.
                         # BLEU score stated as demo-quality (not production NMT).
  # ── C3 RESOLUTION ────────────────────────────────────────────────────────
  uz_wiki_summ:
    desc:    "Wikipedia Uzbek lead-paragraph summarization pairs"
    url:     "https://huggingface.co/datasets/wikimedia/wikipedia (uz subset)"
    size:    "~2 000 juft tayyorlanadi (10-200 token xulosa / 50-500 token maqola)"
    license: "CC-BY-SA 3.0"
    derivation: >
      Derived from the same uzwiki dump built in Stage 0B corpus pipeline —
      NOT a separate download. First paragraph = 'xulosa', remainder = 'maqola'.
      Standard lead-sentence proxy (Nallapati et al. 2016). No standard Uzbek
      summarization dataset exists.
    status:  RESOLVED    # C3 approved: CC-BY-SA, derived from own pipeline dump.
  uz_sentiment_uzum:
    desc:    "Uzum Market sharhlar sentimenti (risqaliyevds/uzbek-sentiment-analysis)"
    url:     "https://huggingface.co/datasets/risqaliyevds/uzbek-sentiment-analysis"
    size:    "352 151 qator; amaliyotda 5 000 (2 500 pos + 2 500 neg) subsample"
    license: "MIT"
    labels:  "reyting 1–5; binarizatsiya: {4,5}→ijobiy, {1,2}→salbiy, 3 tashlanadi"
    status:  VERIFIED    # Real Uzbek sentiment dataset. MIT. Suitable for P13. ✓
  uz_kb:
    desc:    "Bilimlar bazasi: yangiliklar + lex.uz hujjatlar, 10 000 chunk, FAISS"
    size:    "~20 MB text + ~80 MB FAISS index"
    source:  "Kaggle Dataset — attached Day 15"
    status:  APPROVED

weeks:
  1: {theme: "Klassik NLP: preprocessing, klassifikatsiya, embeddinglar, qidiruv",
      days: [1,2,3,4], milestone: w1}
  2: {theme: "Statistik modellar va neyron embeddinglar",
      days: [5,6,7,8], milestone: w2}
  3: {theme: "Rekurrent tarmoqlar va ketma-ketlik modellari",
      days: [9,10,11,12], milestone: w3}
  4: {theme: "Transfer learning, RAG, agentlar, deploy",
      days: [13,14,15,16], milestone: w4}

# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULE
# ─────────────────────────────────────────────────────────────────────────────
schedule:

  # ═══════════════════════════════════════════════════════════════════════════
  # WEEK 1
  # ═══════════════════════════════════════════════════════════════════════════

  - type: teaching_day
    day: 1
    date: 2026-06-15
    week: 1
    # Morning: Orientation (2 h, administrative overhead — not in 32 h practice count).
    # Covers P1 item 1 (Jupyter/Python/library setup) so Day 2 P1 can skip setup.
    orientation:
      desc: "Kursga kirish, muhit sozlash, hisob yaratish, kapstone tanishtirish"
      p1_item_absorbed: "1. Jupyter Notebook va Python kutubxonalarini (NLTK, spaCy) sozlash."
      tasks:
        - "Kaggle hisobi + GPU quota tekshiruvi"
        - "Hugging Face token olish va ~/.kaggle/kaggle.json sozlash"
        - "GitHub repo sozlash va SSH kalit"
        - "Kapstone loyiha skeleti: capstone/modules/ papkasi va contracts.py"
        - "Muhit tekshiruvi: paketlar, versiyalar, OFFLINE_FALLBACK=True"
    # Afternoon: L1 (2 h, in 32 h lecture count)
    lecture_topic: >
      NLP asoslari va matnni qayta ishlash texnologiyalari.
    lecture_official_no: 1
    lecture_subitems:
      - "1. NLPga kirish, tarixi va hissiyotlar (sentiment) tahlili."
      - "2. Matnga dastlabki ishlov berish usullari: tokenizatsiya, normalizatsiya, \"Stop Words\", stemming va lemmatizatsiya."
      - "3. Matn xususiyatlarini aniqlash nazariyasi: BoW va TF-IDF usullari."
      - "4. NLPning asosiy vazifalari va ilovalari."
    seminal_paper: >
      Salton, G., Wong, A., Yang, C.S. (1975). A Vector Space Model for
      Automatic Indexing. Communications of the ACM 18(11).
    uzbek_angle: >
      Agglutinatsiya va TF-IDF: 'o'rganaman', 'o'rganish', 'o'rgandim' — uchta
      alohida token, bir xil o'zak. TF-IDF da sun'iy past ko'rsatkich.
      Stemming zaruriyati o'zbek uchun ayniqsa yuqori.
    # hand_example: L1[I] → P1 (Day 2) first assert
    hand_example:
      description: >
        Kichik korpus (3 hujjat, 4 so'z): D1='nlp qiziq', D2='python foydali',
        D3='nlp foydali'. IDF(nlp)=ln(3/2)≈0.405; IDF(qiziq)=ln(3/1)≈1.099.
        TF-IDF(nlp, D1) = 1 × 0.405 = 0.405.
        TF-IDF(qiziq, D1) = 1 × 1.099 = 1.099.
      expected_value: "TF-IDF('nlp', D1)=0.405; TF-IDF('qiziq', D1)=1.099"
    gpu_required: false
    corpus_subset: null   # orientation only

  - type: teaching_day
    day: 2
    date: 2026-06-16
    week: 1
    practice_official_no: 1
    practice_topic: >
      Matnga ishlov berish konveyerini - payplaynini yaratish.
    practice_subitems:
      - "1. Jupyter Notebook va Python kutubxonalarini (NLTK, spaCy) sozlash."
      - "2. Matnni tokenlarga, gaplarga ajratish va tinish belgilarini olib tashlash."
      - "3. \"Stop-word\"larni filtrlash va stemming va lemmatizatsiya amaliyoti."
      - "4. BoW va TF-IDF vektorlarini \"scikit-learn\" kutubxonasi yordamida yaratish."
    periphery:
      - "Matn faylini yuklash va encoding (to'liq beriladi — PRIMM)"
      - "spaCy uz/xx pipeline yuklash va sent_tokenize (to'liq beriladi)"
    core:
      - "Regex tokenizer o'zbek uchun (apostrof U+2019 va ASCII ' ni hisobga olgan holda)"
      - "Stopword filtri va SnowballStemmer / qo'shimcha qirqish"
      - "CountVectorizer → BoW matritsasi va TF-IDF vaznlash"
    capstone_module:
      name: "TextPreprocessor"
      file: "capstone/modules/m01_text_preprocessor.py"
      interface: "preprocess(text: str) -> list[str]  # tokenize+normalize+stem"
      consumed_by: [3, 5, 6, 7, 8, 9, 11, 15]
    corpus_subset: uz_news_mini
    lecture_official_no: 2
    lecture_topic: >
      Klassik usullar bilan matnlarni tasniflash, klassifikator modellarni
      baholash va NLPdagi etika.
    lecture_subitems:
      - "1. Logistik regressiyani sentiment tahlilida qo'llash."
      - "2. \"Naive Bayes\" nazariyasi va uning kengaytirilgan usullari (\"smoothing\")."
      - "3. NLPda modellarni baholash metrikalari: tasniflash aniqligi (\"accuracy\"), tasdiqlash aniqligi (\"precision\"), to'g'ri topish aniqligi (\"recall\"), F1-baho."
      - "4. NLPda adolat, hisobdorlik va shaffoflik."
    seminal_paper: >
      McCallum, A., Nigam, K. (1998). A Comparison of Event Models for Naive
      Bayes Text Classification. AAAI/ICML-98 Workshop on Learning for Text
      Categorization.
    uzbek_angle: >
      Naive Bayes va morfologiya: 'yaxshi', 'yaxshiroq', 'yaxshilik' —
      uch alohida feature. Bag-of-words o'zbek lug'atini sun'iy kattalashtiradi;
      F1 ga ta'siri.
    hand_example:
      # L2[I] → P2 (Day 3) first assert
      description: >
        Laplace smoothing NB: pos=['yaxshi film','ajoyib film'], neg=['yomon film'].
        |V|=4 {yaxshi,ajoyib,yomon,film}. P(pos)=2/3, P(neg)=1/3.
        P(film|pos)=(2+1)/(4+4)=3/8; P(yaxshi|pos)=(1+1)/8=1/4.
        P(film|neg)=(1+1)/(2+4)=1/3; P(yaxshi|neg)=(0+1)/6=1/6.
        Test 'yaxshi film': score_pos∝(2/3)(1/4)(3/8)=1/16≈0.0625;
        score_neg∝(1/3)(1/6)(1/3)=1/54≈0.0185.
      expected_value: "score_pos/score_neg ≈ 3.38 → ijobiy (positive)"
    gpu_required: false

  - type: milestone
    id: w1
    date: 2026-06-17
    week: 1
    title: "1-hafta milestone: TextPreprocessor integratsiyasi"
    # M1 issued Wed 17-iyun; modules from only Day 2 (P1) are available.
    # Days 3-4 (P2, P3) happen Thu-Fri. Brief is two-phase:
    #   Phase A (Wed, async): Apply m01 to chosen corpus; measure vocab/stats.
    #   Phase B (Fri–weekend, self-directed): integrate m02 after Day 3.
    # Deadline: Mon 22-iyun start of week 2. (Approved design.)
    modules_covered: [1]            # m01 is built by Wed; m02 will be built Fri
    modules_preview:  [2]           # m02 built Day 3 Fri; include in brief as Phase B
    capstone_integration: >
      Phase A: tinglovchi o'z tanlagan hujjatlar to'plamida (50–100 hujjat) m01 ni
      ishlatadi; lug'at hajmi, token / stopword nisbati, eng ko'p uchraydigan 20 so'z
      chiqariladi. Phase B: m02 tayyorgach, m01→m02 pipeline ni sinovdan o'tkazish.
    brief_file:   "milestones/w1_milestone.md"
    check_script: "milestones/w1_check.py"
    deadline:     2026-06-22

  - type: teaching_day
    day: 3
    date: 2026-06-18
    week: 1
    practice_official_no: 2
    practice_topic: >
      Klassik MO' modellaridan foydalanib hissiyotlar tahlilini amalga oshirish.
    practice_subitems:
      - "1. Ma'lumotlar to'plamini tayyorlash, \"o'quv\" va \"sinov\" qismlariga ajratish."
      - "2. \"Scikit-learn\" yordamida logistik regressiya modelini o'qitish."
      - "3. \"Scikit-learn\" yordamida \"Naïve Bayes\" modelini o'qitish."
      - "4. Modellarni baholash: Xatoliklar matritsasini chizish, tasniflash, tasdiqlash va to'g'ri topish aniqliklari, F1-baho ko'rsatkichlarini hisoblash."
    periphery:
      - "train_test_split, pipeline (TfidfVectorizer+classifier) (to'liq beriladi)"
      - "ConfusionMatrixDisplay, classification_report (to'liq beriladi)"
    core:
      - "LogisticRegression ni o'qitish va hyperparameter (C) ta'sirini ko'rish"
      - "MultinomialNB ni o'qitish va precision/recall/F1 taqqoslash"
      - "Xato tahlili: qaysi hujjatlar noto'g'ri tasniflandi va nima uchun"
    capstone_module:
      name: "SentimentClassifier"
      file: "capstone/modules/m02_sentiment_classifier.py"
      interface: "fit(texts, labels) / predict(text: str) -> str / predict_proba(text) -> dict[str,float]"
      consumed_by: [14, 16]
    corpus_subset: uz_news_mini   # binarize: 2 mavzu sinfini sentiment proxy sifatida ishlatish
    lecture_official_no: 3
    lecture_topic: >
      Vektor fazo modellari, semantik munosabatlar va ularni vizualizatsiya qilish.
    lecture_subitems:
      - "1. So'z embeddinglari tushunchasi: taqsimotga asoslangan gipoteza va zich vektorlar."
      - "2. Vektorlararo o'xshashlikni o'lchash: kosinus o'xshashlik nazariyasi."
      - "3. So'z analogiyalari va semantik munosabatlar tushunchasi."
      - "4. PCA usuli yordamida yuqori o'lchamli embeddinglarni vizualizatsiya qilish nazariyasi."
    seminal_paper: >
      Pennington, J., Socher, R., Manning, C.D. (2014). GloVe: Global Vectors
      for Word Representation. EMNLP 2014.
    uzbek_angle: >
      Pretrained embeddinglar va o'zbek: GloVe/Word2Vec asosan ingliz tilida
      o'qitilgan — o'zbek so'zlari uchun coverage juda past. Kelgusi darsda
      o'zbek korpusida noldan o'qitish.
    hand_example:
      # L3[I] → P3 (Day 4) first assert
      description: >
        BoW vektorlari: a=(1,1,1,0), b=(1,1,0,1) (lug'at: nlp,juda,qiziq,foydali).
        dot(a,b)=2; |a|=|b|=sqrt(3).
        cosine(a,b) = 2/(sqrt(3)×sqrt(3)) = 2/3.
      expected_value: "cosine(a,b) = 2/3 ≈ 0.667"
    gpu_required: false

  - type: teaching_day
    day: 4
    date: 2026-06-19
    week: 1
    practice_official_no: 3
    practice_topic: >
      So'z embeddinglari bilan ishlash amaliyoti.
    practice_subitems:
      - "1. Oldindan o'qitilgan \"GloVe\" yoki \"Word2Vec\" embeddinglarini yuklash."
      - "2. So'zlar o'rtasidagi kosinus o'xshashligini hisoblash orqali eng o'xshash so'zlarni topish."
      - "3. Vektor arifmetikasi yordamida so'z analogiyalarini yechish."
      - "4. \"Matplotlib\", \"Seaborn\" kutubxonalari va PCA algoritmi yordamida embeddinglarni ikki o'lchamli fazoda vizualizatsiya qilish."
    periphery:
      - "cc_uz_100k.kv ni gensim KeyedVectors.load() bilan yuklash (to'liq beriladi)"
      - "PCA(n_components=2) + scatter plot (to'liq beriladi)"
    core:
      - "cosine_similarity: sklearn va qo'lda hisob taqqoslash"
      - "wv.most_similar('toshkent', topn=5) va analogiya: 'toshkent'-'uzbekiston'+'rossiya'≈?"
      - "PCA ikki o'lchamli embedding fazosida semantik klasterlarni vizualizatsiya"
    capstone_module:
      name: "PretrainedEmbedder"
      file: "capstone/modules/m03_pretrained_embedder.py"
      interface: "load(path) / embed(word: str) -> np.ndarray / most_similar(word, n) -> list / oov_rate(texts) -> float"
      consumed_by: [5, 8]
    corpus_subset: cc_uz_100k_kv
    lecture_official_no: 4
    lecture_topic: >
      Masofaga asoslangan qidiruv va imlo tuzatish usullari.
    lecture_subitems:
      - "1. Samarali o'xshashlik qidiruvi nazariyasi va qidiruvni tezlashtirish usullari: KNN, LSH."
      - "2. Imlo xatolarini tuzatish uchun \"Noisy channel\" modeli."
      - "3. Minimal tahrir (Levenshteyn) masofasi va dinamik dasturlash."
      - "4. Avtomatik tuzatish tizimlarining arxitekturasi va komponentlari."
    seminal_paper: >
      Norvig, P. (2009). How to Write a Spelling Corrector.
      (norvig.com/spell-correct.html) — Noisy channel, edit distance, unigram LM.
    uzbek_angle: >
      Imlo tuzatish va o'zbek: apostrof (o', g') tufayli "o'qituvchi" va
      "oqutuvchi" Levenshtein masofasi 2 emas — apostrof belgisi hisobga olinishi
      kerak. ASCII vs U+2019 tokenizatsiya muammosi.
    hand_example:
      # L4[I] → P4 (Day 5) first assert
      description: >
        Levenshtein masofasi: edit_distance("qo'l", "ko'l") = 1 (1 ta almashtirish: q→k).
        edit_distance("dastur", "dastir") = 1 (u→i).
        Dinamik dasturlash jadvali 2×2 misolda ko'rsatiladi.
      expected_value: "edit_distance('qo'l','ko'l')=1; edit_distance('dastur','dastir')=1"
    gpu_required: false

  # ═══════════════════════════════════════════════════════════════════════════
  # WEEK 2
  # ═══════════════════════════════════════════════════════════════════════════

  - type: teaching_day
    day: 5
    date: 2026-06-22
    week: 2
    practice_official_no: 4
    practice_topic: >
      Imlo xatolarini tekshirish va qidiruv tizimini yaratish.
    practice_subitems:
      - "1. Levenshteyn masofasi algoritmini implementatsiya qilish va nomzod so'zlarni topish."
      - "2. Ehtimollikka asoslangan \"Noisy Channel\" imlo tuzatish modulini yaratish."
      - "3. Hujjatlar to'plami uchun LSH indeksini qurish."
      - "4. LSH va oddiy qidiruv tezligini katta hajmdagi ma'lumotlarda taqqoslash."
    periphery:
      - "datasketch MinHashLSH API (to'liq beriladi — PRIMM)"
      - "unigram chastota lug'ati va P(word) hisoblash (to'liq beriladi)"
    core:
      - "edit_distance(s1, s2) DP implementatsiyasi (2D jadval)"
      - "Noisy channel: argmax P(w)×P(x|w) — top-k nomzod so'zlar"
      - "LSH indeks qurish va k-NN vs LSH qidiruv tezligini taqqoslash"
    capstone_module:
