      - "3. Transformer arxitekturasini abstrakt matnni umumlashtirishda qo'llash."
      - "4. Umumlashtirish natijalarini ROUGE metrikasi bilan baholash."
    seminal_paper: >
      Vaswani, A., Shazeer, N., Parmar, N., et al. (2017).
      Attention Is All You Need. NeurIPS 30.
    uzbek_angle: >
      Transformer va o'zbek erkin so'z tartibi: positional encoding erkin tartib
      muammosini qanchalik hal qiladi? Self-attention ga SOV va SVO bir xilmi?
    hand_example:
      # L12[I] → P12 (Day 13) first assert
      description: >
        ROUGE-1 F1: Reference='nlp juda qiziq va foydali' (5 token).
        Hypothesis='nlp juda foydali' (3 token).
        Precision = 3/3 = 1.000 (barcha hypothesis tokenlari reference da).
        Recall    = 3/5 = 0.600 (reference tokenlarining 3/5 i topildi).
        F1 = 2×1.0×0.6 / (1.0+0.6) = 1.2/1.6 = 0.750.
      expected_value: "ROUGE-1 P=1.000, R=0.600, F1=0.750"
    gpu_required: true

  # ═══════════════════════════════════════════════════════════════════════════
  # WEEK 4
  # ═══════════════════════════════════════════════════════════════════════════

  - type: teaching_day
    day: 13
    date: 2026-07-06
    week: 4
    practice_official_no: 12
    practice_topic: >
      "Transformer" arxitekturasi yordamida matnlardan xulosalar chiqarish.
    practice_subitems:
      - "1. Matn va uning qisqa mazmuni juftliklaridan iborat ma'lumotlar to'plamini tayyorlash."
      - "2. \"TensorFlow\" yoki \"PyTorch\" kutubxonalari yordamida transformerning Enkoder-Dekoder arxitekturasini qurish."
      - "3. \"Self-Attention\" va \"Positional Encoding\" qatlamlarini implementatsiya qilish."
      - "4. Modelni o'qitish va yangi matnlar uchun qisqa mazmun generatsiya qilish."
    # Kaggle-hardware: d_model=128, 4 heads, 2 layers, vocab=5000, T4 16GB.
    # Most architecture code in periphery; core = self-attention + pos-encoding + training loop.
    periphery:
      - "Wikipedia Uzbek lead-sentence juftlari yuklash (to'liq beriladi)"
      - "Custom BPE tokenizer (sentencepiece, vocab=5000) (to'liq beriladi)"
      - "Encoder-Decoder scaffold: layer norm, FFN, residual (to'liq beriladi)"
    core:
      - "ScaledDotProductAttention + MultiHeadAttention implementatsiyasi"
      - "PositionalEncoding (sinusoidal) implementatsiyasi"
      - "Mini-training loop (10 epoch, GPU); ROUGE-1 baholash"
    capstone_module:
      name: "TransformerSummarizer"
      file: "capstone/modules/m12_transformer_summarizer.py"
      interface: "train(src_texts, tgt_texts, epochs) / summarize(text: str) -> str / rouge1(refs, hyps) -> float"
      consumed_by: [15, 16]
    corpus_subset: uz_wiki_summ   # RESOLVED C3 — CC-BY-SA, from own uzwiki dump pipeline
    lecture_official_no: 13
    lecture_topic: >
      "Transfer Learning" va oldindan o'qitilgan modellar (BERT, T5).
    lecture_subitems:
      - "1. \"Transfer Learning\" paradigmasi: \"Pre-training\" va \"Fine-tuning\"."
      - "2. BERT modeli."
      - "3. T5 (\"Text-to-Text Transfer Transformer\")."
      - "4. \"Hugging Face\" ekotizimi va uning ahamiyati."
    seminal_paper: >
      Devlin, J., Chang, M., Lee, K., Toutanova, K. (2019). BERT: Pre-training of
      Deep Bidirectional Transformers for Language Understanding. NAACL-HLT 2019.
    uzbek_angle: >
      BERT tokenizatsiya o'zbek uchun: mBERT WordPiece o'zbek qo'shimchalarini
      noto'g'ri kesadi — 'o'rganaman' → 5 subword token. XLM-RoBERTa
      SentencePiece bilan solishtirish.
    hand_example:
      # L13[I] → P13 (Day 14) first assert
      description: >
        BCE yo'qotish funksiyasi: logit=2.0 (ijobiy sinf).
        p = σ(2.0) = 1/(1+e^{-2.0}) = 1/(1+0.1353) = 1/1.1353 ≈ 0.880.
        BCE = -log(0.880) = -(-0.128) ≈ 0.128.
        Ishonchli to'g'ri bashorat → past yo'qotish.
      expected_value: "σ(2.0)≈0.880; BCE loss≈0.128"
    gpu_required: true

  - type: teaching_day
    day: 14
    date: 2026-07-07
    week: 4
    practice_official_no: 13
    practice_topic: >
      "Hugging Face" bilan nozik sozlash amaliyoti.
    practice_subitems:
      - "1. \"Hugging Face transformers\" va \"datasets\" kutubxonalarini o'rnatish va tanishish."
      - "2. Oldindan o'qitilgan BERT modelini sentiment tahlili vazifasi uchun nozik sozlash (\"fine-tuning\")."
      - "3. \"Trainer API\" yordamida o'qitish jarayonini soddalashtirish."
      - "4. Nozik sozlangan modelni baholash va uni paylayn yordamida ishlatish."
    # VERIFIED DATASET:
    verified_dataset:
      name: "risqaliyevds/uzbek-sentiment-analysis"
      url:  "https://huggingface.co/datasets/risqaliyevds/uzbek-sentiment-analysis"
      license: "MIT"
      size: "352 151 qator; amaliyotda 5 000 subsample (2 500 pos + 2 500 neg)"
      labels: "reyting 1–5; binarizatsiya: {4,5}→ijobiy, {1,2}→salbiy, 3-chi sinf tashlanadi"
      load_code: "load_dataset('risqaliyevds/uzbek-sentiment-analysis')"
      task: "binary sentiment (ijobiy/salbiy)"
      verdict: "VERIFIED ✓ — real Uzbek e-commerce reviews, MIT, suitable for P13."
    periphery:
      - "Uzum Market sharhlarini yuklash va binarizatsiya (to'liq beriladi)"
      - "AutoTokenizer tokenizatsiya + DataCollatorWithPadding (to'liq beriladi)"
    core:
      - "AutoModelForSequenceClassification.from_pretrained('distilbert-base-multilingual-cased')"
      - "TrainingArguments: lr=2e-5, batch=16, epochs=3, warmup_steps=100"
      - "Trainer.train() + evaluate(); classification_report"
    capstone_module:
      name: "FineTunedClassifier"
      file: "capstone/modules/m13_bert_classifier.py"
      interface: "fit(texts, labels, model_name) / predict(text: str) -> str / predict_proba(text) -> dict / save(path) / load(path)"
      consumed_by: [16]   # Day 16 (P15 LangChain agent uses it as a tool)
                          # Also consumed by M4 (P16 FastAPI deploys m13)
    corpus_subset: uz_sentiment_uzum
    lecture_official_no: 14
    lecture_topic: >
      RAG va vektor ma'lumotlar bazalari.
    lecture_subitems:
      - "1. LLM cheklovlari (gallyutsinatsiyalar) va RAG yondashuvi."
      - "2. RAG jarayoni: tashqi manbalardan ma'lumot qidirish va javob yaratish."
      - "3. Zamonaviy qidiruvda vektor embeddinglarining o'rni."
      - "4. Vektor ma'lumotlar bazalari (\"Pinecone\", \"Weaviate\") va ularning RAG tizimlaridagi roli."
    seminal_paper: >
      Lewis, P., Perez, E., Piktus, A., et al. (2020). Retrieval-Augmented
      Generation for Knowledge-Intensive NLP Tasks. NeurIPS 33.
    uzbek_angle: >
      RAG va o'zbek huquqiy matnlar: lex.uz qonunchilik hujjatlari bazasi —
      hallucination xavfi yuqori domenlarda RAG ayniqsa muhim.
      O'zbek tilida LLM javoblari qanchalik ishonchli?
    hand_example:
      # L14[I] → P14 (Day 15) first assert
      description: >
        RAG prompt token hisobi: 3 ta retrieved chunk (har biri ≈200 token)
        + instruction template (≈100 token) = 700 token.
        LLM kontekst oynasiga nisbatan: 700/128000 < 1%.
        Javob hallyusinatsiya o'rniga kontekstga tayanadi.
      expected_value: "prompt ≈ 700 token; retrieved_docs=3; cost ≈ minimal"
    gpu_required: true

